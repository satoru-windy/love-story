<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星降る学園 ～放課後の約束～</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');

body {
  font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#game {
  width: 900px;
  height: 600px;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(120, 80, 200, 0.3);
}

#background {
  position: absolute;
  inset: 0;
  transition: background 1s ease;
}

.bg-school { background: linear-gradient(135deg, #87CEEB 0%, #E0F0FF 40%, #FFF8DC 100%); }
.bg-sunset { background: linear-gradient(180deg, #FF6B35 0%, #FF8C61 30%, #FFB088 60%, #2D1B69 100%); }
.bg-night { background: linear-gradient(180deg, #0B0B2B 0%, #1A1A4E 40%, #2D2D6B 100%); }
.bg-cafe { background: linear-gradient(135deg, #8B6914 0%, #D4A853 30%, #F5E6CC 60%, #FFF8F0 100%); }
.bg-rain { background: linear-gradient(180deg, #4A5568 0%, #718096 40%, #A0AEC0 70%, #CBD5E0 100%); }
.bg-sakura { background: linear-gradient(135deg, #FFB7C5 0%, #FFC0CB 30%, #FFE4E9 60%, #FFF5F7 100%); }
.bg-library { background: linear-gradient(135deg, #654321 0%, #8B7355 30%, #C4A882 60%, #F5E6CC 100%); }
.bg-rooftop { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%); }

.stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

.sakura-petal {
  position: absolute;
  width: 12px;
  height: 12px;
  background: radial-gradient(ellipse, #FFB7C5, #FF69B4);
  border-radius: 50% 0 50% 0;
  opacity: 0.7;
  animation: fall linear infinite;
  pointer-events: none;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(620px) rotate(720deg); opacity: 0; }
}

.rain-drop {
  position: absolute;
  width: 2px;
  background: linear-gradient(transparent, rgba(174, 194, 224, 0.6));
  pointer-events: none;
  animation: rainFall linear infinite;
}
@keyframes rainFall {
  0% { transform: translateY(-20px); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(620px); opacity: 0.3; }
}

#character-area {
  position: absolute;
  bottom: 160px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 350px;
  pointer-events: none;
}

.character-sprite {
  transition: all 0.5s ease;
  filter: drop-shadow(0 8px 30px rgba(0,0,0,0.4));
  animation: charAppear 0.6s ease-out;
}
.character-sprite svg {
  width: 280px;
  height: 350px;
}
@keyframes charAppear {
  from { transform: translateY(30px) scale(0.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

#textbox {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 180px;
  background: linear-gradient(180deg, rgba(10, 10, 30, 0.85), rgba(10, 10, 30, 0.95));
  backdrop-filter: blur(10px);
  border-top: 2px solid rgba(120, 80, 200, 0.5);
  padding: 20px 30px;
  display: flex;
  flex-direction: column;
}

#speaker {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  padding: 2px 12px;
  border-radius: 4px;
  display: inline-block;
  width: fit-content;
  min-height: 24px;
}

#dialogue {
  font-size: 16px;
  line-height: 1.8;
  flex: 1;
  letter-spacing: 0.5px;
}

#click-indicator {
  position: absolute;
  bottom: 12px;
  right: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  animation: blink 1.2s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

#choices {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  width: 500px;
}

.choice-btn {
  background: linear-gradient(135deg, rgba(120, 80, 200, 0.8), rgba(80, 50, 160, 0.9));
  border: 1px solid rgba(180, 140, 255, 0.5);
  color: #fff;
  padding: 16px 24px;
  font-size: 16px;
  font-family: 'Noto Sans JP', sans-serif;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: left;
  backdrop-filter: blur(10px);
}
.choice-btn:hover {
  background: linear-gradient(135deg, rgba(160, 120, 240, 0.9), rgba(120, 80, 200, 1));
  border-color: rgba(220, 180, 255, 0.8);
  transform: translateX(8px);
  box-shadow: 0 0 20px rgba(120, 80, 200, 0.5);
}

#title-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #0B0B2B 0%, #1A1A4E 40%, #2D1B69 70%, #FF6B9D22 100%);
  z-index: 20;
}

#title-screen h1 {
  font-size: 42px;
  font-weight: 700;
  background: linear-gradient(135deg, #FFB7C5, #FF69B4, #DDA0DD);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  text-shadow: none;
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

#title-screen .subtitle {
  font-size: 20px;
  color: rgba(255, 183, 197, 0.7);
  margin-bottom: 50px;
  letter-spacing: 8px;
}

#start-btn {
  background: transparent;
  border: 2px solid rgba(255, 183, 197, 0.6);
  color: #FFB7C5;
  padding: 14px 60px;
  font-size: 18px;
  font-family: 'Noto Sans JP', sans-serif;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 4px;
}
#start-btn:hover {
  background: rgba(255, 183, 197, 0.15);
  border-color: #FFB7C5;
  box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
}

#affection-display {
  position: absolute;
  top: 12px;
  right: 16px;
  display: flex;
  gap: 16px;
  z-index: 5;
  font-size: 13px;
}
.affection-item {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(0,0,0,0.4);
  padding: 4px 10px;
  border-radius: 20px;
  backdrop-filter: blur(5px);
}
.affection-hearts {
  color: #FF69B4;
  font-size: 12px;
}

#day-display {
  position: absolute;
  top: 12px;
  left: 16px;
  background: rgba(0,0,0,0.4);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  backdrop-filter: blur(5px);
  z-index: 5;
}

#ending-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
  animation: fadeIn 2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#ending-screen h2 {
  font-size: 36px;
  margin-bottom: 16px;
}
#ending-screen p {
  font-size: 18px;
  line-height: 2;
  text-align: center;
  max-width: 600px;
  margin-bottom: 40px;
}
#ending-screen .ending-label {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
  letter-spacing: 4px;
}

#restart-btn {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.4);
  color: #fff;
  padding: 12px 40px;
  font-size: 16px;
  font-family: 'Noto Sans JP', sans-serif;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
}
#restart-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: #fff;
}

.hidden { display: none !important; }

.fade-transition {
  animation: screenFade 0.8s ease;
}
@keyframes screenFade {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>

      { speaker: 'ren', text: '……また明日な、相棒。', char: 'ren' },
      { speaker: 'narr', text: '蓮は軽く手を振って去っていった。\nその背中は、いつもより少しだけ小さく見えた。' },
    ],
    title: '「夕暮れのあと」',
    label: 'NORMAL END — 蓮ルート',
    endBg: 'bg-sunset',
  },
  alone: {
    bg: 'bg-night',
    effects: 'stars',
    steps: [
      { speaker: 'narr', text: '……誰も来なかった。\n\n星だけが静かに瞬いている。' },
      { speaker: 'narr', text: 'でも、不思議と寂しくはなかった。\nこの学園での日々は、まだ始まったばかりなのだから。' },
    ],
    title: '「一人の夜空」',
    label: 'NORMAL END',
    endBg: 'bg-night',
  },
};

function getEnding() {
  const h = state.affection.hina;
  const r = state.affection.ren;
  if (h >= 10 && h > r) return 'hina_true';
  if (r >= 10 && r > h) return 'ren_true';
  if (h > r && h >= 5) return 'hina_normal';
  if (r > h && r >= 5) return 'ren_normal';
  if (h >= 5 && h === r) return Math.random() > 0.5 ? 'hina_normal' : 'ren_normal';
  return 'alone';
}

// ===== DOM =====
const bg = document.getElementById('background');
const textbox = document.getElementById('textbox');
const speakerEl = document.getElementById('speaker');
const dialogueEl = document.getElementById('dialogue');
const choicesEl = document.getElementById('choices');
const charEl = document.getElementById('character');
const dayEl = document.getElementById('day-display');
const affEl = document.getElementById('affection-display');
const clickInd = document.getElementById('click-indicator');
const titleScreen = document.getElementById('title-screen');
const endingScreen = document.getElementById('ending-screen');

function createStars() {
  const container = document.getElementById('stars');
  container.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 70 + '%';
    star.style.animationDelay = Math.random() * 2 + 's';
    star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
    container.appendChild(star);
  }
}

function clearEffects() {
  document.querySelectorAll('.sakura-petal, .rain-drop').forEach(e => e.remove());
}

function addSakura() {
  for (let i = 0; i < 15; i++) {
    const petal = document.createElement('div');
    petal.className = 'sakura-petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (Math.random() * 4 + 4) + 's';
    petal.style.animationDelay = Math.random() * 6 + 's';
    bg.appendChild(petal);
  }
}

function addRain() {
  for (let i = 0; i < 40; i++) {
    const drop = document.createElement('div');
    drop.className = 'rain-drop';
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 20 + 10) + 'px';
    drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
    drop.style.animationDelay = Math.random() * 2 + 's';
    bg.appendChild(drop);
  }
}

function setBackground(bgClass, effects) {
  bg.className = bgClass;
  clearEffects();
  const starsEl = document.getElementById('stars');
  starsEl.classList.add('hidden');
  if (effects === 'sakura') addSakura();
  if (effects === 'rain') addRain();
  if (effects === 'stars' || bgClass === 'bg-night' || bgClass === 'bg-rooftop') {
    starsEl.classList.remove('hidden');
    createStars();
  }
}

function updateAffection() {
  const hearts = (n) => {
    const full = Math.min(Math.floor(n / 2), 5);
    const half = n % 2 && full < 5 ? 1 : 0;
    const empty = 5 - full - half;
    return '♥'.repeat(full) + (half ? '♡' : '') + '♡'.repeat(empty);
  };
  affEl.innerHTML = `
    <div class="affection-item">
      <span style="color:#FF69B4">陽菜</span>
      <span class="affection-hearts">${hearts(state.affection.hina)}</span>
    </div>
    <div class="affection-item">
      <span style="color:#4FC3F7">蓮</span>
      <span class="affection-hearts">${hearts(state.affection.ren)}</span>
    </div>
  `;
}

function updateDay(day) {
  state.day = day;
  dayEl.textContent = `${day}日目`;
}

function showCharacter(charId) {
  if (!charId) { charEl.innerHTML = ''; return; }
  if (CHARACTER_SVG[charId]) {
    charEl.innerHTML = CHARACTER_SVG[charId];
  } else {
    charEl.innerHTML = '';
  }
  charEl.style.animation = 'none';
  charEl.offsetHeight;
  charEl.style.animation = 'charAppear 0.6s ease-out';
}

function typeText(text, callback) {
  state.typing = true;
  state.currentText = text;
  dialogueEl.textContent = '';
  clickInd.classList.add('hidden');
  let i = 0;
  function type() {
    if (!state.typing) {
      dialogueEl.textContent = text;
      clickInd.classList.remove('hidden');
      if (callback) callback();
      return;
    }
    if (i < text.length) {
      dialogueEl.textContent += text[i];
      i++;
      state.typingTimeout = setTimeout(type, text[i-1] === '\n' ? 200 : 35);
    } else {
      state.typing = false;
      clickInd.classList.remove('hidden');
      if (callback) callback();
    }
  }
  type();
}

function skipTyping() {
  if (state.typing) {
    state.typing = false;
    clearTimeout(state.typingTimeout);
    dialogueEl.textContent = state.currentText;
    clickInd.classList.remove('hidden');
    return true;
  }
  return false;
}

function showChoices(options) {
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('hidden');
  textbox.classList.add('hidden');
  clickInd.classList.add('hidden');

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.style.animationDelay = i * 0.1 + 's';
    btn.onclick = () => {
      if (opt.effects) {
        for (const [k, v] of Object.entries(opt.effects)) {
          state.affection[k] = Math.max(0, (state.affection[k] || 0) + v);
        }
        updateAffection();
      }
      if (opt.flag) state.flags[opt.flag] = true;
      choicesEl.classList.add('hidden');
      textbox.classList.remove('hidden');

      if (opt.next !== undefined) {
        state.scene = opt.next;
        state.step = 0;
        playScene();
      } else {
        state.step++;
        playStep();
      }
    };
    choicesEl.appendChild(btn);
  });
}

let endingSteps = null;
let endingKey = null;

function playStep() {
  const scene = endingSteps || SCENES[state.scene];
  const steps = scene.steps || [];

  // Find the next valid step
  while (state.step < steps.length) {
    const step = steps[state.step];
    if (step.condition && !step.condition()) {
      state.step++;
      continue;
    }
    break;
  }

  if (state.step >= steps.length) {
    if (endingSteps) {
      showEndingScreen();
      return;
    }
    const nextScene = scene.next;
    if (nextScene === -1) {
      // Branch to ending
      endingKey = getEnding();
      const ending = ENDINGS[endingKey];
      endingSteps = ending;
      state.step = 0;
      setBackground(ending.bg, ending.effects);
      playStep();
      return;
    }
    state.scene = nextScene;
    state.step = 0;
    playScene();
    return;
  }

  const step = steps[state.step];

  if (step.choice) {
    showChoices(step.options);
    return;
  }

  const c = CHARACTERS[step.speaker];
  speakerEl.textContent = c.name;
  speakerEl.style.background = c.name ? c.color + '33' : 'transparent';
  speakerEl.style.color = c.color;
  showCharacter(step.char || null);

  typeText(step.text);
}

function playScene() {
  const scene = SCENES[state.scene];
  if (!scene) return;

  if (scene.day && scene.day !== state.day) {
    updateDay(scene.day);
  }
  if (scene.bg) {
    setBackground(scene.bg, scene.effects);
  }

  state.step = 0;
  playStep();
}

function showEndingScreen() {
  const ending = ENDINGS[endingKey];
  textbox.classList.add('hidden');
  charEl.textContent = '';
  dayEl.classList.add('hidden');
  affEl.classList.add('hidden');

  setBackground(ending.endBg, 'stars');

  endingScreen.classList.remove('hidden');
  endingScreen.innerHTML = `
    <div class="ending-label">${ending.label}</div>
    <h2 style="background: linear-gradient(135deg, #FFB7C5, #DDA0DD); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${ending.title}</h2>
    <p>好感度：陽菜 ${'♥'.repeat(Math.min(Math.floor(state.affection.hina/2),5))} (${state.affection.hina})　蓮 ${'♥'.repeat(Math.min(Math.floor(state.affection.ren/2),5))} (${state.affection.ren})</p>
    <button id="restart-btn" onclick="location.reload()">もう一度はじめから</button>
  `;
}

function startGame() {
  titleScreen.classList.add('hidden');
  textbox.classList.remove('hidden');
  dayEl.classList.remove('hidden');
  affEl.classList.remove('hidden');

  state.scene = 0;
  state.step = 0;
  state.affection = { hina: 0, ren: 0 };
  state.day = 1;
  state.flags = {};
  endingSteps = null;
  endingKey = null;

  updateAffection();
  updateDay(1);
  playScene();
}

// Click handler
document.getElementById('game').addEventListener('click', (e) => {
  if (e.target.closest('.choice-btn') || e.target.closest('#start-btn') || e.target.closest('#restart-btn')) return;
  if (titleScreen && !titleScreen.classList.contains('hidden')) return;
  if (!endingScreen.classList.contains('hidden')) return;
  if (!choicesEl.classList.contains('hidden')) return;

  if (skipTyping()) return;

  state.step++;
  playStep();
});

// Title screen stars
createStars();
</script>
</body>
</html>
